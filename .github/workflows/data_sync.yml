name: SwingPulse Data Sync

on:
  # Runs every 30 minutes during US market hours (Mon–Fri, ~9AM–5:30PM ET / 13:00–21:30 UTC)
  schedule:
    - cron: "*/30 13-21 * * 1-5"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Fetch & Score → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data sync
        env:
          SUPABASE_SYNC_URL: ${{ secrets.SUPABASE_SYNC_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          SUPABASE_PRICES_URL: ${{ secrets.SUPABASE_PRICES_URL }}
          SUPABASE_ALERTS_URL: ${{ secrets.SUPABASE_ALERTS_URL }}
        run: python pipeline/fetch_and_score.py

      - name: Open GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create sync-failure \
            --color E53E3E \
            --description "Automated data sync pipeline failure" \
            --force

          OPEN=$(gh issue list --label sync-failure --state open --json number --jq length)
          if [ "$OPEN" -eq 0 ]; then
            gh issue create \
              --title "Data Sync Failure — $(date -u '+%Y-%m-%d %H:%M UTC')" \
              --label sync-failure \
              --body "## SwingPulse Data Sync Failed

The scheduled data pipeline did not complete successfully.

**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')
**Trigger:** ${{ github.event_name }}

### What to check
- [ ] Review the [failed run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
- [ ] Run \`python pipeline/fetch_and_score.py\` locally to reproduce
- [ ] Check yfinance is returning data for all tickers
- [ ] Verify Supabase Edge Function is reachable
- [ ] Confirm \`SUPABASE_SYNC_URL\` and \`SYNC_API_KEY\` secrets are still valid

_Close this issue once the pipeline is running again._"
          fi
