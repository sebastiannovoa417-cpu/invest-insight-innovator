name: SwingPulse Data Sync

on:
  # Runs every 30 minutes around the clock
  schedule:
    - cron: "*/30 * * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: Fetch & Score → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data sync
        env:
          SUPABASE_SYNC_URL: ${{ secrets.SUPABASE_SYNC_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python pipeline/fetch_and_score.py
